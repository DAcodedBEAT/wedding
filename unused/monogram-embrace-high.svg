<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!--
    EMBRACE — HIGH NEST (A IN UPPER BOWL)
    A sits in the upper concave area of S — sheltered above by S's
    arching upper stroke, the S's full lower body sweeping below.
    Reads as S cradling A from underneath, rather than surrounding.
    Visually lighter and more open than the "waist" placement.
  -->
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap');</style>
  </defs>
  <rect width="800" height="800" fill="#ffffff"/>

  <!-- Gold accent dots -->
  <circle cx="462" cy="148" r="3.5" fill="#b8964e"/>
  <circle cx="344" cy="632" r="3.5" fill="#b8964e"/>

  <!-- Thin side rules to frame the composition -->
  <line x1="100" y1="395" x2="185" y2="395" stroke="#b8964e" stroke-width="0.6"/>
  <line x1="615" y1="395" x2="700" y2="395" stroke="#b8964e" stroke-width="0.6"/>

  <!-- S — shifted down slightly so its upper bowl opens up high -->
  <text
    x="415" y="590"
    text-anchor="middle"
    font-family="'Great Vibes', cursive"
    font-size="505" fill="#1a1a1a"
  >S</text>

  <!-- A — positioned in S's upper counter area (above the waist) -->
  <!-- White halo -->
  <text
    x="448" y="325"
    text-anchor="middle"
    font-family="'Great Vibes', cursive"
    font-size="178"
    fill="none" stroke="#ffffff" stroke-width="14"
    stroke-linejoin="round" paint-order="stroke fill"
  >A</text>

  <!-- A — main -->
  <text
    x="448" y="325"
    text-anchor="middle"
    font-family="'Great Vibes', cursive"
    font-size="178" fill="#1a1a1a"
  >A</text>
</svg>
