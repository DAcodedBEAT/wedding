<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@100;300&display=swap');
    </style>
  </defs>

  <!-- Background: white. For black (LED wall), swap to fill="#000000" and all fills below to "#ffffff" -->
  <rect width="800" height="800" fill="#ffffff"/>

  <!-- Thin outer border for print bleed reference (remove if not needed) -->
  <rect x="40" y="40" width="720" height="720" fill="none" stroke="#e0e0e0" stroke-width="0.5"/>

  <!-- Vertical divider line — the only decoration -->
  <line x1="400" y1="260" x2="400" y2="560" stroke="#000000" stroke-width="1"/>

  <!-- Small top tick -->
  <line x1="380" y1="260" x2="420" y2="260" stroke="#000000" stroke-width="1"/>
  <!-- Small bottom tick -->
  <line x1="380" y1="560" x2="420" y2="560" stroke="#000000" stroke-width="1"/>

  <!-- Initial A — left of divider -->
  <text
    x="265"
    y="510"
    text-anchor="middle"
    font-family="'Josefin Sans', 'Helvetica Neue', Arial, sans-serif"
    font-weight="100"
    font-size="260"
    fill="#000000"
    letter-spacing="8"
  >A</text>

  <!-- Initial S — right of divider -->
  <text
    x="535"
    y="510"
    text-anchor="middle"
    font-family="'Josefin Sans', 'Helvetica Neue', Arial, sans-serif"
    font-weight="100"
    font-size="260"
    fill="#000000"
    letter-spacing="8"
  >S</text>

  <!-- DARK MODE / LED WALL: change rect fill to #000000, all text + line fills/strokes to #ffffff -->
</svg>
