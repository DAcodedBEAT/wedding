<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=EB+Garamond:ital@0;1&display=swap');
    </style>
    <!-- Path for circular text -->
    <path id="topArc"    d="M 140,400 A 260,260 0 0,1 660,400"/>
    <path id="bottomArc" d="M 155,415 A 245,245 0 0,0 645,415"/>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="#ffffff"/>

  <!-- ============================================================
       OUTER RING — double circle
       ============================================================ -->
  <circle cx="400" cy="400" r="310" fill="none" stroke="#1c1c1c" stroke-width="1.8"/>
  <circle cx="400" cy="400" r="300" fill="none" stroke="#1c1c1c" stroke-width="0.5"/>

  <!-- Inner thin ring (creates the crest band area) -->
  <circle cx="400" cy="400" r="268" fill="none" stroke="#b89a4e" stroke-width="0.8"/>

  <!-- ============================================================
       LAUREL BRANCH — LEFT SIDE (pure SVG paths)
       Mirrored right branch below
       ============================================================ -->

  <!-- Left laurel branch -->
  <g stroke="#1c1c1c" stroke-width="1" fill="none">
    <!-- Main stem -->
    <path d="M 200 560 C 210 520, 185 490, 175 455 C 168 430, 172 410, 178 385 C 184 360, 178 340, 185 310"/>
    <!-- Leaves along the stem — ellipse-ish bezier shapes -->
    <path d="M 178 535 C 165 520, 148 510, 145 495 C 142 480, 155 470, 170 475 C 185 478, 192 492, 186 505 Z" fill="#1c1c1c"/>
    <path d="M 182 500 C 162 490, 142 482, 138 465 C 134 450, 148 440, 162 448 C 178 455, 186 470, 180 485 Z" fill="#1c1c1c"/>
    <path d="M 180 465 C 162 455, 145 442, 143 425 C 141 410, 155 403, 168 412 C 183 420, 188 438, 182 452 Z" fill="#1c1c1c"/>
    <path d="M 180 430 C 163 418, 150 403, 150 386 C 150 370, 164 364, 176 374 C 190 384, 192 403, 184 418 Z" fill="#1c1c1c"/>
    <path d="M 183 395 C 167 381, 156 365, 158 348 C 160 332, 174 328, 185 340 C 196 351, 196 370, 187 384 Z" fill="#1c1c1c"/>
    <path d="M 186 358 C 172 343, 164 325, 168 308 C 172 292, 187 290, 196 303 C 206 316, 204 336, 194 350 Z" fill="#1c1c1c"/>
    <!-- Small berries -->
    <circle cx="148" cy="498" r="3" fill="#b89a4e"/>
    <circle cx="144" cy="468" r="3" fill="#b89a4e"/>
    <circle cx="152" cy="388" r="3" fill="#b89a4e"/>
    <circle cx="170" cy="332" r="3" fill="#b89a4e"/>
  </g>

  <!-- Right laurel branch (mirrored across x=400) -->
  <g stroke="#1c1c1c" stroke-width="1" fill="none" transform="translate(800,0) scale(-1,1)">
    <path d="M 200 560 C 210 520, 185 490, 175 455 C 168 430, 172 410, 178 385 C 184 360, 178 340, 185 310"/>
    <path d="M 178 535 C 165 520, 148 510, 145 495 C 142 480, 155 470, 170 475 C 185 478, 192 492, 186 505 Z" fill="#1c1c1c"/>
    <path d="M 182 500 C 162 490, 142 482, 138 465 C 134 450, 148 440, 162 448 C 178 455, 186 470, 180 485 Z" fill="#1c1c1c"/>
    <path d="M 180 465 C 162 455, 145 442, 143 425 C 141 410, 155 403, 168 412 C 183 420, 188 438, 182 452 Z" fill="#1c1c1c"/>
    <path d="M 180 430 C 163 418, 150 403, 150 386 C 150 370, 164 364, 176 374 C 190 384, 192 403, 184 418 Z" fill="#1c1c1c"/>
    <path d="M 183 395 C 167 381, 156 365, 158 348 C 160 332, 174 328, 185 340 C 196 351, 196 370, 187 384 Z" fill="#1c1c1c"/>
    <path d="M 186 358 C 172 343, 164 325, 168 308 C 172 292, 187 290, 196 303 C 206 316, 204 336, 194 350 Z" fill="#1c1c1c"/>
    <circle cx="148" cy="498" r="3" fill="#b89a4e"/>
    <circle cx="144" cy="468" r="3" fill="#b89a4e"/>
    <circle cx="152" cy="388" r="3" fill="#b89a4e"/>
    <circle cx="170" cy="332" r="3" fill="#b89a4e"/>
  </g>

  <!-- ============================================================
       CIRCULAR TEXT (enable/disable this section as desired)
       ============================================================ -->
  <!-- Top arc: "TOGETHER" -->
  <text font-family="'EB Garamond', Georgia, serif" font-size="22" fill="#1c1c1c" letter-spacing="10">
    <textPath href="#topArc" startOffset="14%">T O G E T H E R</textPath>
  </text>
  <!-- Bottom arc: "FOREVER" -->
  <text font-family="'EB Garamond', Georgia, serif" font-size="22" fill="#1c1c1c" letter-spacing="10">
    <textPath href="#bottomArc" startOffset="18%">F O R E V E R</textPath>
  </text>

  <!-- Small dot separators on the ring -->
  <circle cx="400" cy="91" r="3" fill="#b89a4e"/>
  <circle cx="400" cy="713" r="3" fill="#b89a4e"/>

  <!-- ============================================================
       MAIN INITIALS — stacked A over S, united by thin rule
       ============================================================ -->

  <!-- A -->
  <text
    x="400" y="388"
    text-anchor="middle"
    font-family="'Playfair Display', Georgia, serif"
    font-weight="400"
    font-size="195"
    fill="#1c1c1c"
  >A</text>

  <!-- Thin divider rule -->
  <line x1="295" y1="408" x2="505" y2="408" stroke="#b89a4e" stroke-width="0.9"/>
  <!-- Small center diamond on rule -->
  <polygon points="400,403 404,408 400,413 396,408" fill="#b89a4e"/>

  <!-- S -->
  <text
    x="400" y="555"
    text-anchor="middle"
    font-family="'Playfair Display', Georgia, serif"
    font-weight="400"
    font-size="195"
    fill="#1c1c1c"
  >S</text>

  <!-- DARK MODE: rect fill #1a1a1a, text + stroke fills #f5f0eb, gold stays or brightens to #d4af6e -->
</svg>
