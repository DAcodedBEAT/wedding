<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!--
    AS — CORMORANT (both letters)
    Cormorant (not Garamond — the base Cormorant family) has the most
    extreme thick/thin contrast of any free serif. Thinner hairlines,
    more delicate feel than Bodoni. Same diagonal overlap composition.
    Where Bodoni is bold and decisive, Cormorant is airy and aristocratic.
  -->
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Cormorant:wght@400;500&display=swap');</style>
  </defs>

  <rect width="800" height="800" fill="#ffffff"/>

  <!-- S — larger, lower-right, behind -->
  <text
    x="462" y="542"
    text-anchor="middle"
    font-family="'Cormorant', 'Cormorant Garamond', Georgia, serif"
    font-weight="400" font-size="345" fill="#1a1a1a"
  >S</text>

  <!-- A — smaller, upper-left, in front -->
  <text
    x="320" y="468"
    text-anchor="middle"
    font-family="'Cormorant', 'Cormorant Garamond', Georgia, serif"
    font-weight="400" font-size="215" fill="#1a1a1a"
  >A</text>
</svg>
