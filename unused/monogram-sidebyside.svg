<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!--
    COMPOSITION: Side by Side
    A and S flank a central ornament on a single baseline.
    Clean, horizontal, reads instantly at any scale.
  -->
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap');</style>
  </defs>
  <rect width="800" height="800" fill="#ffffff"/>

  <!-- Thin baseline rule across the full width -->
  <line x1="80" y1="510" x2="720" y2="510" stroke="#1a1a1a" stroke-width="0.5"/>

  <!-- Top cap rule -->
  <line x1="180" y1="262" x2="620" y2="262" stroke="#1a1a1a" stroke-width="0.5"/>

  <!-- Diamond end-stops on top rule -->
  <polygon points="180,262 186,256 192,262 186,268" fill="#b8964e"/>
  <polygon points="608,262 614,256 620,262 614,268" fill="#b8964e"/>

  <!-- Diamond end-stops on baseline rule -->
  <polygon points="80,510 86,504 92,510 86,516" fill="#b8964e"/>
  <polygon points="708,510 714,504 720,510 714,516" fill="#b8964e"/>

  <!-- Center ornament: stacked diamonds -->
  <polygon points="400,430 407,437 400,444 393,437" fill="#b8964e"/>
  <polygon points="400,446 405,451 400,456 395,451" fill="#b8964e"/>

  <!-- A -->
  <text
    x="228" y="505"
    text-anchor="middle"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-weight="300" font-size="265" fill="#1a1a1a"
  >A</text>

  <!-- S -->
  <text
    x="572" y="505"
    text-anchor="middle"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-weight="300" font-size="265" fill="#1a1a1a"
  >S</text>
</svg>
